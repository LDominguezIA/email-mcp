<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="margin:0;padding:0;font-family:Segoe UI,Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f9;padding:32px 0;">
  <tr><td align="center">
    <table width="620" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);">

      <!-- HEADER -->
      <tr>
        <td style="background:linear-gradient(135deg,#1e293b,#334155);padding:36px 40px;">
          <p style="color:#94a3b8;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin:0 0 8px;">{{subtitulo}}</p>
          <h1 style="color:#ffffff;font-size:22px;font-weight:700;margin:0;">{{titulo}}</h1>
          <p style="color:#cbd5e1;font-size:14px;margin:8px 0 0;">Para: <strong>{{destinatario}}</strong></p>
        </td>
      </tr>

      <!-- CONTENIDO -->
      <tr>
        <td style="padding:32px 40px;">
          <div style="color:#374151;font-size:14px;line-height:1.8;">{{contenido}}</div>
        </td>
      </tr>

      <!-- FOOTER -->
      <tr>
        <td style="background:#f8fafc;border-top:1px solid #e2e8f0;padding:18px 40px;">
          <table width="100%" cellpadding="0" cellspacing="0">
            <tr>
              <td><p style="color:#94a3b8;font-size:11px;margin:0;">{{remitente}} · Powered by Claude Code</p></td>
              <td align="right"><p style="color:#94a3b8;font-size:11px;margin:0;">{{fecha}} · {{hora}}</p></td>
            </tr>
          </table>
        </td>
      </tr>

    </table>
  </td></tr>
</table>
</body>
</html>
