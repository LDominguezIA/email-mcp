name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Validate (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verify no external dependencies
        run: |
          DEPS=$(node -e "const p=require('./package.json'); const d=Object.keys(p.dependencies||{}); console.log(d.length)")
          echo "External dependencies: $DEPS"
          if [ "$DEPS" -gt "0" ]; then echo "❌ Se encontraron dependencias externas" && exit 1; fi

      - name: Check syntax — all source files
        run: |
          for f in src/*.js; do
            echo "Checking $f..."
            node --input-type=module --check < "$f" || exit 1
          done

      - name: Verify server starts (smoke test)
        run: |
          timeout 3s node src/index.js <<< '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"0"}}}' || true
          echo "✅ Smoke test passed"
        env:
          SMTP_USER: test@example.com
          SMTP_PASS: test
          FROM_EMAIL: test@example.com
